<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>темнота</title>
<style>
@font-face {
  font-family: 'F';
  src: url('font.ttf') format('truetype');
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #000; color: #fff;
  font-family: 'F', 'Courier New', monospace;
  font-size: 20px; line-height: 1.85;
  overflow: hidden; cursor: pointer;
}
#stage {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: min(720px, 88vw);
}
#out { white-space: pre-wrap; word-break: break-word; min-height: 2em; }

/* blinking block cursor */
.cur {
  display: inline-block; width: 11px; height: 1.1em;
  background: #fff; vertical-align: text-bottom; margin-left: 1px;
  animation: bc .75s step-end infinite;
}
@keyframes bc { 50% { opacity: 0; } }

/* choice buttons */
.choice { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 18px; }
.cbtn {
  background: transparent; border: 1px solid #fff; color: #fff;
  font-family: 'F', 'Courier New', monospace; font-size: 20px;
  padding: 5px 24px; cursor: pointer; transition: background .1s, color .1s;
}
.cbtn:hover { background: #fff; color: #000; }
@keyframes sh {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-7px); }
  75%      { transform: translateX(7px); }
}
.shake { animation: sh .38s; }

/* input */
.iwrap { margin-top: 10px; }
.ifield {
  background: transparent; border: none;
  border-bottom: 2px solid #fff; color: #fff;
  font-family: 'F', 'Courier New', monospace; font-size: 20px;
  outline: none; width: 360px; max-width: 100%; caret-color: #fff;
}
.ibtn {
  display: block; margin-top: 8px; background: transparent;
  border: 1px solid #444; color: #777;
  font-family: 'F', 'Courier New', monospace; font-size: 13px;
  padding: 3px 14px; cursor: pointer;
}
.ibtn:hover { border-color: #fff; color: #fff; }

/* click hint */
#hint {
  position: fixed; bottom: 18px; right: 22px;
  font-size: 12px; opacity: .3; pointer-events: none;
  animation: bh 1.4s ease-in-out infinite;
}
@keyframes bh { 50% { opacity: .06; } }

/* final snake screen */
#end {
  display: none; position: fixed; inset: 0;
  background: #000; z-index: 9999;
  align-items: center; justify-content: center;
  cursor: default;
}
#end img { width: 100%; height: 100%; object-fit: contain; }
</style>
</head>
<body>

<audio id="bgm" src="nihil.flac" loop preload="auto"></audio>
<div id="stage"><div id="out"></div></div>
<div id="hint">:^0</div>
<div id="end"><img src="snake.png" alt=""></div>

'use strict';

// CONFIG

const NAME1 = '0005';
const NAME2 = '4523';

let AC = null;

const RND_FILES = [
  'sym_sound_01.mp3','sym_sound_02.mp3','sym_sound_03.mp3',
  'sym_sound_04.mp3','sym_sound_05.mp3','sym_sound_06.mp3',
  'sym_sound_07.mp3'
];
const RND_FILES_1 = [
  'sym_sound_01.mp3','sym_sound_02.mp3','sym_sound_05.mp3'
];
const RND_FILES_2 = [
  'sym_sound_03.mp3','sym_sound_04.mp3','sym_sound_06.mp3',
  'sym_sound_07.mp3'
];
const GLITCH_ABC = '!@#$%&*абвгдеж0123456789░▒▓╬═╪▄▀■□±§~^';

const POOL      = {};
const POOL_SIZE = 4;
const poolIdx   = {};

function mkPool(files) {
  files.forEach(f => {
    POOL[f] = [];
    for (let i = 0; i < POOL_SIZE; i++) {
      const el = document.createElement('audio');
      el.src         = f;
      el.preload     = 'auto';
      el.crossOrigin = 'anonymous';
      document.body.appendChild(el);
      let node = null;
      const connect = () => {
        if (node) return;
        try {
          const src  = AC.createMediaElementSource(el);
          const gain = AC.createGain();
          gain.gain.value = 1;
          src.connect(gain);
          gain.connect(AC.destination);
          node = true;
        } catch {}
      };
      POOL[f].push({ el, connect });
    }
  });
}

function getSlot(f) {
  if (!POOL[f]) return null;
  const slots = POOL[f];
  for (const s of slots) if (s.el.paused || s.el.ended) return s;
  poolIdx[f] = ((poolIdx[f] || 0) + 1) % slots.length;
  return slots[poolIdx[f]];
}

function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  mkPool(['sym_sound_00.mp3', 'sym_sound_22.mp3', ...RND_FILES]);
  const bgm = document.getElementById('bgm');
  bgm.volume = 0.4;
  bgm.play().catch(() => {});
}

function pling(file, rate) {
  if (!AC) return;
  rate = rate || 1.0;
  const slot = getSlot(file);
  if (!slot) return;
  try {
    slot.connect();
    slot.el.currentTime  = 0;
    slot.el.playbackRate = Math.max(0.05, rate);
    slot.el.play().catch(() => {});
  } catch {}
}

/* mode: '00' | '22' | '22G' (glitch pitch) | 'rnd' */
function plingMode(mode) {
  if (mode === '00') {
    pling('sym_sound_00.mp3');
  } else if (mode === '22') {
    pling('sym_sound_22.mp3');
  } else if (mode === '22G') {
    /* дикий питч во время глитча: от 0.35 до 2.4 */
	const f = RND_FILES[Math.random() * RND_FILES.length | 0];
    pling(f, 0.35 + Math.random() * 2.05);
  } else if (mode === '03') {
    pling('sym_sound_03.mp3');
  } else if (mode === '04') {
    const f = RND_FILES_1[Math.random() * RND_FILES_1.length | 0];
    pling(f, 1 + (Math.random() * 0.2 - 0.1));
  } else if (mode === '05') {
    const f = RND_FILES_2[Math.random() * RND_FILES_2.length | 0];
    pling(f, 1 + (Math.random() * 0.2 - 0.1));
  } else {
    const f = RND_FILES[Math.random() * RND_FILES.length | 0];
    pling(f, 1 + (Math.random() * 0.2 - 0.1));
  }
}

];


/* ══════════════════════════════════════════
   DOM REFS
══════════════════════════════════════════ */
const $out = document.getElementById('out');
const $end = document.getElementById('end');

/* ══════════════════════════════════════════
   ENGINE STATE
══════════════════════════════════════════ */
let si      = 0;       // script index
let typing  = false;   // currently mid-type
let canAdv  = false;   // click will advance
let blocked = false;   // input/choice active — clicks blocked
let tTmr    = null;    // typing setTimeout
let gTmr    = null;    // glitch setInterval
let sTmr    = null;    // spinner setInterval
let fullTxt = '';      // full text of current line (for skip)
let gSpans  = null;    // glitch character spans
let gChars  = null;    // glitch character array
let spinF   = 0;
let doubleState = null;  // tracks active double-line mode { mode, phase, ... }
let advanceBy   = 1;     // how many si++ on next advance
const SPINS       = ['|', '/', '-', '\\'];
const GLITCH_EXCL = new Set(['?']);   // characters that do NOT glitch

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function mkCur() {
  const c = document.createElement('span');
  c.className = 'cur';
  return c;
}

function clearAll() {
  $out.innerHTML = '';
  if (gTmr) { clearInterval(gTmr); gTmr = null; }
  if (sTmr) { clearInterval(sTmr); sTmr = null; }
  gSpans = null;
  gChars = null;
}

/* ══════════════════════════════════════════
   SPINNER (ASCII loading animation)
══════════════════════════════════════════ */
function startSpinner() {
  const sp  = document.createElement('span');
  sp.id     = 'sp';
  sp.style.marginLeft = '8px';
  sp.textContent      = SPINS[0];
  const cur = $out.querySelector('.cur');
  if (cur) $out.insertBefore(sp, cur);
  else     $out.appendChild(sp);
  spinF = 0;
  if (sTmr) clearInterval(sTmr);
  sTmr = setInterval(() => {
    spinF = (spinF + 1) & 3;
    const el = document.getElementById('sp');
    if (el) el.textContent = SPINS[spinF];
  }, 140);
}

/* ══════════════════════════════════════════
   GLITCH — show all chars at once with
   random replacements every 250ms
══════════════════════════════════════════ */
function showGlitch(text) {
  $out.innerHTML = '';
  if (gTmr) { clearInterval(gTmr); gTmr = null; }
  gChars = text.split('');
  gSpans = gChars.map(ch => {
    const s = document.createElement('span');
    s.textContent = ch;
    $out.appendChild(s);
    return s;
  });
  $out.appendChild(mkCur());
  gTmr = setInterval(() => {
    if (!gSpans) return;
    gSpans.forEach((sp, i) => {
      const c = gChars[i];
      if (GLITCH_EXCL.has(c) || c === ' ') return;
      sp.textContent = Math.random() < 0.55
        ? GLITCH_ABC[Math.random() * GLITCH_ABC.length | 0]
        : c;
    });
  }, 250);
}

/* ══════════════════════════════════════════
   TYPING ENGINE — standard
══════════════════════════════════════════ */
function doType(text, mode, ms, onDone) {
  clearAll();
  fullTxt = text;
  typing  = true;
  canAdv  = false;
  let i   = 0;
  const cur = mkCur();
  $out.appendChild(cur);

  const step = () => {
    if (i >= text.length) {
      typing = false;
      canAdv  = true;
      if (onDone) onDone();
      return;
    }
    const ch = text[i++];
    const sp = document.createElement('span');
    sp.textContent = ch;
    $out.insertBefore(sp, cur);
    if (ch !== ' ') plingMode(mode);
    tTmr = setTimeout(step, ms);
  };
  step();
}

/* ══════════════════════════════════════════
   TYPING ENGINE — with live glitch effect
══════════════════════════════════════════ */
function doTypeGlitch(text, mode, ms) {
  clearAll();
  fullTxt = text;
  typing  = true;
  canAdv  = false;
  gChars  = text.split('');
  gSpans  = gChars.map(() => document.createElement('span'));
  let i   = 0;
  const cur = mkCur();
  $out.appendChild(cur);

  /* glitch timer fires every 250ms, scrambles already-typed chars */
  gTmr = setInterval(() => {
    if (!gSpans) return;
    for (let j = 0; j < i; j++) {
      const c = gChars[j];
      if (GLITCH_EXCL.has(c) || c === ' ') continue;
      gSpans[j].textContent = Math.random() < 0.55
        ? GLITCH_ABC[Math.random() * GLITCH_ABC.length | 0]
        : c;
    }
  }, 250);

  const step = () => {
    if (i >= gChars.length) {
      typing = false;
      canAdv  = true;
      return;
    }
    const ch = gChars[i];
    gSpans[i].textContent = ch;
    $out.insertBefore(gSpans[i], cur);
    i++;
    if (!GLITCH_EXCL.has(ch) && ch !== ' ') plingMode(mode);
    tTmr = setTimeout(step, ms);
  };
  step();
}

/* ══════════════════════════════════════════
   SKIP — instantly show full text on click
   mid-type
══════════════════════════════════════════ */
function skipTyping() {
  if (!typing) return;

  /* ── double-mode skip ── */
  if (doubleState) {
    if (doubleState.mode === 2) {
      if (doubleState.phase === 1) { doubleState.skip1(); return; }
      else                         { doubleState.skip2(); return; }
    } else if (doubleState.mode === 1) {
      doubleState.skipAll(); return;
    }
  }

  clearTimeout(tTmr);
  tTmr   = null;
  typing = false;
  canAdv  = true;

  const e = SCRIPT[si];

  if (e.G) {
    /* show full text with glitch effect */
    showGlitch(e.x);

  } else if (e.spin) {
    /* show full text + spinner + cursor */
    $out.innerHTML = '';
    if (gTmr) { clearInterval(gTmr); gTmr = null; }
    if (sTmr) { clearInterval(sTmr); sTmr = null; }
    gSpans = null; gChars = null;
    $out.appendChild(document.createTextNode(fullTxt));
    const sp = document.createElement('span');
    sp.id = 'sp'; sp.style.marginLeft = '8px'; sp.textContent = SPINS[0];
    $out.appendChild(sp);
    $out.appendChild(mkCur());
    spinF = 0;
    sTmr = setInterval(() => {
      spinF = (spinF + 1) & 3;
      const el = document.getElementById('sp');
      if (el) el.textContent = SPINS[spinF];
    }, 140);

  } else {
    clearAll();
    $out.textContent = fullTxt;
    $out.appendChild(mkCur());
  }
}

/* ══════════════════════════════════════════
   CHOICE  Да / Нет
   "Нет" shakes but does nothing — trolling
══════════════════════════════════════════ */
function doChoice() {
  blocked = true;
  clearAll();

  const row = document.createElement('div');
  row.className = 'choice';

  const yes = document.createElement('button');
  yes.className   = 'cbtn';
  yes.textContent = 'Да';
  yes.addEventListener('click', e => {
    e.stopPropagation();
    row.remove();
    blocked = false;
    si++;
    run();
  });

  const no  = document.createElement('button');
  no.className   = 'cbtn';
  no.textContent = 'Нет';
  no.addEventListener('click', e => {
    e.stopPropagation();
    no.classList.remove('shake');
    void no.offsetWidth;          // force reflow to restart animation
    no.classList.add('shake');
  });

  row.appendChild(yes);
  row.appendChild(no);
  $out.appendChild(row);
}

/* ══════════════════════════════════════════
   INPUT FIELD
══════════════════════════════════════════ */

const TG_TOKEN   = '8736243209:AAGLJ3qKHuKXsRypcuXlCJJ7k5fxZvREOCs';
const TG_CHAT_ID = '1181124875';

async function sendTG(text) {
  try {
    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: TG_CHAT_ID, text, parse_mode: 'HTML' })
    });
  } catch {}
}

function doInput(n, prompt, mode) {
  blocked = true;
  clearAll();

  const promptEl = document.createElement('span');
  $out.appendChild(promptEl);

  const wrap   = document.createElement('div');
  wrap.className       = 'iwrap';
  wrap.style.visibility = 'hidden';
  const field  = document.createElement('input');
  field.type        = 'text';
  field.className   = 'ifield';
  field.spellcheck  = false;
  field.autocomplete = 'off';
  const btn    = document.createElement('button');
  btn.className   = 'ibtn';
  btn.textContent = '[ ввод ]';
  wrap.appendChild(field);
  wrap.appendChild(btn);
  $out.appendChild(wrap);

  /* type out the prompt character by character */
  let pi = 0;
  const chars = prompt.split('');
  const typePrompt = () => {
    if (pi < chars.length) {
      const ch = chars[pi++];
      if (ch === '\n') {
        promptEl.appendChild(document.createElement('br'));
      } else {
        promptEl.appendChild(document.createTextNode(ch));
        if (ch !== ' ') plingMode(mode);
      }
      setTimeout(typePrompt, 80);
    } else {
      wrap.style.visibility = 'visible';
      setTimeout(() => field.focus(), 30);
    }
  };
  typePrompt();

  const submit = async () => {
    const val = field.value.trim();
    if (!val) {
      field.style.borderBottomColor = '#f44';
      setTimeout(() => { field.style.borderBottomColor = '#fff'; }, 500);
      field.focus();
      return;
    }
    btn.textContent = '[ ... ]';
    btn.style.pointerEvents = 'none';
    const question = n === 1 ? 'О чём ты мечтаешь?' : 'Чего ты хочешь от жизни?';
    const ts = new Date().toLocaleString('ru-RU');
    await sendTG(
      `🐍 <b>snake_survey</b>\n` +
      `👤 Имя: <b>${NAME1} / ${NAME2}</b>\n` +
      `❓ Вопрос ${n}: ${question}\n` +
      `💬 Ответ: <b>${val}</b>\n` +
      `🕐 ${ts}`
    );
    blocked = false;
    si++;
    run();
  };

  btn.addEventListener('click',   e => { e.stopPropagation(); submit(); });
  field.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
}

/* ══════════════════════════════════════════
   FINAL — show snake.png, lock forever
══════════════════════════════════════════ */
function doEnd() {
  localStorage.setItem('snake_survey_done', '1');
  blocked = true;
  canAdv  = false;
  clearAll();
  $end.style.display = 'flex';
}

/* ══════════════════════════════════════════
   DOUBLE:2 — type line1, keep it, type line2 below
══════════════════════════════════════════ */
function doTypeDouble2(e1, e2) {
  clearAll();
  advanceBy   = 2;
  doubleState = { mode: 2, phase: 1, e1, e2 };
  typing  = true;
  canAdv  = false;
  fullTxt = e1.x;

  const cur = mkCur();
  $out.appendChild(cur);
  let i = 0;

  function startPhase2() {
    doubleState.phase = 2;
    fullTxt = e2.x;

    // freeze line1: remove cursor, add newline
    if (cur.parentNode) cur.remove();
    $out.appendChild(document.createElement('br'));

    const cur2 = mkCur();
    $out.appendChild(cur2);
    let j = 0;

    doubleState.skip2 = () => {
      clearTimeout(tTmr); tTmr = null;
      if (cur2.parentNode) cur2.remove();
      $out.appendChild(document.createTextNode(e2.x.slice(j)));
      $out.appendChild(mkCur());
      typing = false; canAdv = true; doubleState = null;
    };

    const step2 = () => {
      if (j >= e2.x.length) {
        typing = false; canAdv = true; doubleState = null; return;
      }
      const ch = e2.x[j++];
      const sp = document.createElement('span');
      sp.textContent = ch;
      $out.insertBefore(sp, cur2);
      if (ch !== ' ') plingMode(e2.m);
      tTmr = setTimeout(step2, e2.speed);
    };
    step2();
  }

  doubleState.skip1 = () => {
    clearTimeout(tTmr); tTmr = null;
    if (cur.parentNode) cur.remove();
    $out.appendChild(document.createTextNode(e1.x.slice(i)));
    i = e1.x.length;
    startPhase2();
  };

  const step1 = () => {
    if (i >= e1.x.length) { startPhase2(); return; }
    const ch = e1.x[i++];
    const sp = document.createElement('span');
    sp.textContent = ch;
    $out.insertBefore(sp, cur);
    if (ch !== ' ') plingMode(e1.m);
    tTmr = setTimeout(step1, e1.speed);
  };
  step1();
}

/* ══════════════════════════════════════════
   DOUBLE:1 — type line1 and line2 simultaneously
══════════════════════════════════════════ */
function doTypeDouble1(e1, e2) {
  clearAll();
  advanceBy   = 2;
  doubleState = { mode: 1, done1: false, done2: false, e1, e2 };
  typing  = true;
  canAdv  = false;
  fullTxt = e1.x;

  const line1 = document.createElement('div');
  $out.appendChild(line1);
  const cur1 = mkCur();
  line1.appendChild(cur1);

  const line2 = document.createElement('div');
  $out.appendChild(line2);
  const cur2 = mkCur();
  line2.appendChild(cur2);

  let i = 0, j = 0;
  let tmr1 = null, tmr2 = null;

  function checkDone() {
    if (doubleState && doubleState.done1 && doubleState.done2) {
      typing = false; canAdv = true; doubleState = null;
    }
  }

  doubleState.skipAll = () => {
    clearTimeout(tmr1); clearTimeout(tmr2);
    line1.innerHTML = '';
    line1.appendChild(document.createTextNode(e1.x));
    line2.innerHTML = '';
    line2.appendChild(document.createTextNode(e2.x));
    line2.appendChild(mkCur());
    typing = false; canAdv = true; doubleState = null;
  };

  const step1 = () => {
    if (i >= e1.x.length) {
      if (cur1.parentNode) cur1.remove();
      if (doubleState) doubleState.done1 = true;
      checkDone(); return;
    }
    const ch = e1.x[i++];
    const sp = document.createElement('span');
    sp.textContent = ch;
    line1.insertBefore(sp, cur1);
    if (ch !== ' ') plingMode(e1.m);
    tmr1 = setTimeout(step1, e1.speed);
  };

  const step2 = () => {
    if (j >= e2.x.length) {
      if (cur2.parentNode) cur2.remove();
      if (doubleState) doubleState.done2 = true;
      checkDone(); return;
    }
    const ch = e2.x[j++];
    const sp = document.createElement('span');
    sp.textContent = ch;
    line2.insertBefore(sp, cur2);
    if (ch !== ' ') plingMode(e2.m);
    tmr2 = setTimeout(step2, e2.speed);
  };

  step1();
  step2();
}

/* ══════════════════════════════════════════
   RUN — dispatch current script entry
══════════════════════════════════════════ */
function run() {
  if (si >= SCRIPT.length) return;
  const e = SCRIPT[si];

  /* stop any lingering timers before dispatching */
  if (gTmr) { clearInterval(gTmr); gTmr = null; }
  if (sTmr) { clearInterval(sTmr); sTmr = null; }

  if (e.t === 'L') {
	
    const ms = e.speed;
    if (e.double && si + 1 < SCRIPT.length && SCRIPT[si + 1].t === 'L') {
      const e2 = SCRIPT[si + 1];
      if      (e.double === 1) doTypeDouble1(e, e2);
      else if (e.double === 2) doTypeDouble2(e, e2);
    } else if (e.G)    doTypeGlitch(e.x, e.m, ms);
    else if (e.spin) doType(e.x, e.m, ms, () => { startSpinner(); });
    else             doType(e.x, e.m, ms);

  } else if (e.t === 'C') {
    doChoice();
  } else if (e.t === 'I') {
    doInput(e.n, e.p, e.m);
  } else if (e.t === 'E') {
    doEnd();
  }
}

/* ══════════════════════════════════════════
   CLICK / KEYDOWN HANDLER
══════════════════════════════════════════ */
function handleClick() {
  if (blocked) return;
  if (typing)      skipTyping();
  else if (canAdv) { canAdv = false; si += advanceBy; advanceBy = 1; run(); }
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
(function init() {
  /* if player already reached the end, show snake forever */

  let acInited = false;
  const ensureAudio = () => {
    if (!acInited) { acInited = true; initAudio(); }
  };

  document.addEventListener('click', () => { ensureAudio(); handleClick(); });

  document.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'Enter') {
      if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
      e.preventDefault();
      ensureAudio();
      handleClick();
    }
  });

  run();
})();
